<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supporting Economic Mobility</title>
  <!-- ดึงฟอนต์ Inter จาก Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style1.css">
</head>
<body>
  <main class="container">
    <!-- กล่องการ์ดหลัก -->
    <div class="card">
      <!-- ส่วนหัวของการ์ด ประกอบด้วยหัวข้อและรายละเอียด -->
      <div class="card-header">
        <h1 class="card-title">Supporting economic<br>mobility</h1>
        <p class="card-description">
          Everyone should have access to a good job and income that can help them<br>and their families have a better life.
        </p>
      </div>
      <!-- ส่วนกล่องครอบรูปภาพด้านล่างการ์ด -->
      <div class="card-image-wrapper">
        <img src="profile.jpg" alt="Supporting economic mobility - รูปภาพประกอบ" class="card-image">
      </div>
    </div>
  </main>
</body>
</html>
