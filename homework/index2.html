<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Depth - Outcomes</title>
  <!-- ดึงฟอนต์ Inter จาก Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <!-- เชื่อมโยงไฟล์สไตล์ CSS -->
  <link rel="stylesheet" href="style2.css">
</head>
<body>
  <main class="container">
    <!-- การ์ดแสดงผลสถิติหลัก -->
    <div class="card">
      <h1 class="card-title">Depth</h1>
      <p class="card-subtitle">
        Our employment and income outcomes within 3 and 6 months of program completion
      </p>

      <!-- กลุ่มสถิติชุดที่ 1 -->
      <div class="stat-group">
        <div class="stat-pill">
          <span class="stat-number">82%</span>
        </div>
        <p class="stat-label">
          of graduates placed in jobs within six months of program completion (73% at three months)
        </p>
      </div>

      <!-- กลุ่มสถิติชุดที่ 2 -->
      <div class="stat-group">
        <div class="stat-pill">
          <span class="stat-number">$1.5 billion</span>
        </div>
        <p class="stat-label">
          in cumulative wages earned by graduates since 2015
        </p>
      </div>
    </div>
  </main>
</body>
</html>
